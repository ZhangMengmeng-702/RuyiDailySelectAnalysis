<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x64" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>如意金股 - RuyiDailyStockAnalysis</title>
    <meta name="description" content="如意金股（RuyiDailyStockAnalysis）- AI 量化决策引擎，作者：张梦梦" />
    <meta name="author" content="张梦梦" />
    <script>
      (() => {
        const storageKey = 'theme';
        const root = document.documentElement;
        const storedTheme = localStorage.getItem(storageKey);
        const theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : 'dark';
        root.classList.remove('light', 'dark');
        root.classList.add(theme);
        root.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
