<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Candle body -->
  <rect x="8" y="6" width="4" height="20" rx="1" fill="url(#ig)"/>
  <rect x="16" y="10" width="4" height="16" rx="1" fill="#10B981"/>
  <rect x="24" y="4" width="4" height="22" rx="1" fill="url(#ig)"/>
  <!-- Wick lines -->
  <line x1="10" y1="2" x2="10" y2="6" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="8" x2="18" y2="10" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="2" x2="26" y2="4" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ruyi cloud accent dot -->
  <circle cx="10" cy="3" r="1.5" fill="#F59E0B"/>
</svg>